<main class="page form-page"><h1>{{ isEditMode ? 'Editar produto' : 'Novo produto' }}</h1>@if (errorMessage) { <p class="error">{{ errorMessage }}</p> }
  <form class="form" [formGroup]="form" (ngSubmit)="save()"><section><h2>Dados do produto</h2><label>Código<input formControlName="code" placeholder="Ex: PRD-001"></label><label>Nome<input formControlName="name" placeholder="Ex: Mesa Industrial"></label><label>Valor de venda<input formControlName="salePrice" type="number" step="0.01" min="0"></label></section>
    <section><div class="section-header"><div><h2>Composição</h2><p>Informe as matérias-primas necessárias para produzir 1 unidade.</p></div><button class="primary" type="button" (click)="addComposition()">Adicionar item</button></div>
      <div formArrayName="compositions">@for (group of compositions.controls; track $index; let index = $index) { <div class="composition-item" [formGroupName]="index"><label>Matéria-prima<select formControlName="rawMaterialId"><option [ngValue]="null">Selecione</option>@for (item of rawMaterials; track item.id) { <option [ngValue]="item.id">{{ item.code }} - {{ item.name }} ({{ item.unit }})</option> }</select></label><label>Quantidade necessária<input formControlName="requiredQuantity" type="number" step="0.001" min="0.001"></label><button class="danger" type="button" (click)="removeComposition(index)">Remover</button></div> }</div>
    </section><div class="actions"><a class="button" routerLink="/products">Cancelar</a><button class="primary" type="submit" [disabled]="loading">{{ loading ? 'Salvando...' : 'Salvar' }}</button></div>
  </form>
</main>
